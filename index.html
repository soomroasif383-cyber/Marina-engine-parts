<!DOCTYPE html>
<html>
<head>
  <title>Marina Engine Parts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f1f5f9;
    }

    /* NAVBAR */
    .navbar {
      background: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #2563eb;
    }

    .contact {
      font-weight: bold;
      color: #111;
    }

    /* HERO */
    .hero {
      background: linear-gradient(to right, #2563eb, #3b82f6);
      color: white;
      padding: 40px 20px;
      text-align: center;
      border-radius: 0 0 30px 30px;
    }

    /* PRODUCTS */
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .card h4 {
      margin: 10px 0;
    }

    .price {
      color: #2563eb;
      font-weight: bold;
      font-size: 16px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #2563eb;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      font-size: 14px;
    }

    .btn:hover {
      background: #1e40af;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #555;
    }

  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">Marina Engine Parts</div>
  <div class="contact">📞 03161131767</div>
</div>

<div class="hero">
  <h1>Premium Engine Parts Store</h1>
  <p>Quality Products | Trusted Service</p>
</div>

<div class="container">

  <div class="card">
    <img src="https://i.postimg.cc/c4MjB7vP/20260122-174414.jpg">
    <h4>impuler</h4>
    <p class="price">Rs: 2500</p>
    <a class="btn" href="https://wa.me/923161131767?text=Order Oil Filter">Order Now</a>
  </div>

  <div class="card">
    <img src="https://i.postimg.cc/ZqyxVZft/20260225-170630.jpg">
    <h4>watar pump</h4>
    <p class="price">Rs: 45000</p>
    <a class="btn" href="https://wa.me/923161131767?text=Order Piston Kit">Order Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Spark Plug</h4>
    <p class="price">Rs: 800</p>
    <a class="btn" href="https://wa.me/923161131767?text=Order Spark Plug">Order Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Air Filter</h4>
    <p class="price">Rs: 1500</p>
    <a class="btn" href="https://wa.me/923161131767?text=Order Air Filter">Order Now</a>
  </div>

</div>

<footer>
  <p>© 2026 Marina Engine Parts</p>
</footer>

</body>
